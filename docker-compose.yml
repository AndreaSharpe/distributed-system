services:
  mysql-master:
    image: mysql:5.7
    command:
      - --server-id=1
      - --log-bin=mysql-bin
      - --binlog-format=ROW
      - --gtid-mode=ON
      - --enforce-gtid-consistency=ON
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: seckill_db
    ports:
      - "3308:3306"
    volumes:
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./docker/mysql/master/init/01-replication-user.sql:/docker-entrypoint-initdb.d/02-replication-user.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - backend

  mysql-slave:
    image: mysql:5.7
    command:
      - --server-id=2
      - --relay-log=mysql-relay-bin
      - --read-only=ON
      - --gtid-mode=ON
      - --enforce-gtid-consistency=ON
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3309:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - backend

  mysql-replication-init:
    image: mysql:5.7
    depends_on:
      mysql-master:
        condition: service_healthy
      mysql-slave:
        condition: service_healthy
    command: >
      bash -c "
      mysql -hmysql-master -uroot -proot -e \"SELECT 1\" &&
      mysql -hmysql-slave -uroot -proot -e \"SELECT 1\" &&
      mysql -hmysql-slave -uroot -proot -e \"STOP SLAVE; RESET SLAVE ALL; CHANGE MASTER TO MASTER_HOST='mysql-master', MASTER_USER='repl', MASTER_PASSWORD='repl123', MASTER_AUTO_POSITION=1; START SLAVE;\" &&
      mysql -hmysql-slave -uroot -proot -e \"SHOW SLAVE STATUS\\G\"
      "
    restart: "no"
    networks:
      - backend

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - backend

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      - zookeeper
    ports:
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
    networks:
      - backend

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - backend

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-master:3306/seckill_db?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
    depends_on:
      mysql-master:
        condition: service_healthy
      mysql-replication-init:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - backend

  product-service:
    build:
      context: .
      dockerfile: product-service/Dockerfile
    environment:
      SERVER_PORT: 8080
      SPRING_RW_WRITE_URL: jdbc:mysql://mysql-master:3306/seckill_db?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC
      SPRING_RW_WRITE_USERNAME: root
      SPRING_RW_WRITE_PASSWORD: root
      SPRING_RW_READ_URL: jdbc:mysql://mysql-slave:3306/seckill_db?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC
      SPRING_RW_READ_USERNAME: root
      SPRING_RW_READ_PASSWORD: root
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_ELASTICSEARCH_URIS: http://elasticsearch:9200
    depends_on:
      mysql-master:
        condition: service_healthy
      mysql-slave:
        condition: service_healthy
      mysql-replication-init:
        condition: service_started
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_started
    networks:
      - backend

  stock-service:
    build:
      context: .
      dockerfile: stock-service/Dockerfile
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-master:3306/seckill_db?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
    depends_on:
      mysql-master:
        condition: service_healthy
      mysql-replication-init:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - backend

  order-service:
    build:
      context: .
      dockerfile: order-service/Dockerfile
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-master:3306/seckill_db?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      STOCK_SERVICE_BASE_URL: http://stock-service:8080
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SNOWFLAKE_WORKER_ID: 1
    depends_on:
      mysql-master:
        condition: service_healthy
      mysql-replication-init:
        condition: service_started
      redis:
        condition: service_healthy
      stock-service:
        condition: service_started
      kafka:
        condition: service_started
    networks:
      - backend

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.23
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    networks:
      - backend

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./static:/usr/share/nginx/html:ro
    depends_on:
      - user-service
      - product-service
      - stock-service
      - order-service
    networks:
      - backend

networks:
  backend:
    driver: bridge
