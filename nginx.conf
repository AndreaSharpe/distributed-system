worker_processes 1;
events { worker_connections 1024; }
http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    resolver 127.0.0.11 valid=5s ipv6=off;

    upstream user_backend {
        zone user_backend 64k;
        server user-service:8080 resolve;
    }

    upstream product_backend {
        zone product_backend 64k;
        server product-service:8080 resolve;
    }

    upstream stock_backend {
        zone stock_backend 64k;
        server stock-service:8080 resolve;
    }

    upstream order_backend {
        zone order_backend 64k;
        server order-service:8080 resolve;
    }

    upstream payment_backend {
        zone payment_backend 64k;
        server payment-service:8080 resolve;
    }
    server {
        listen 80;
        # Static
        location = / {
            root /usr/share/nginx/html;
            try_files /index.html =404;
        }
        location ~* ^/assets/.*\.(js|mjs)$ {
            root /usr/share/nginx/html;
            default_type application/javascript;
            try_files $uri =404;
        }
        location ~* ^/assets/.*\.css$ {
            root /usr/share/nginx/html;
            default_type text/css;
            try_files $uri =404;
        }
        location /assets/ {
            root /usr/share/nginx/html;
            types {
                application/javascript js mjs;
                text/css css;
                application/json json;
                image/svg+xml svg;
            }
            try_files $uri =404;
        }
        location /static/ {
            alias /usr/share/nginx/html/;
            try_files $uri $uri/ =404;
        }
        # Vue SPA: history mode fallback
        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
        }

        # API routing by service
        location /api/users/ {
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://user_backend;
        }
        location /api/products/ {
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://product_backend;
        }
        location /api/stocks/ {
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://stock_backend;
        }
        location /api/orders/ {
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://order_backend;
        }
        location /api/payments/ {
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://payment_backend;
        }
    }
}

