server:
  port: ${SERVER_PORT:8080}
spring:
  shardingsphere:
    datasource:
      names: write_ds,read_ds
      write_ds:
        type: com.zaxxer.hikari.HikariDataSource
        driver-class-name: com.mysql.cj.jdbc.Driver
        jdbc-url: ${SPRING_RW_WRITE_URL:jdbc:mysql://mysql-master:3306/seckill_db?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC}
        username: ${SPRING_RW_WRITE_USERNAME:root}
        password: ${SPRING_RW_WRITE_PASSWORD:root}
      read_ds:
        type: com.zaxxer.hikari.HikariDataSource
        driver-class-name: com.mysql.cj.jdbc.Driver
        jdbc-url: ${SPRING_RW_READ_URL:jdbc:mysql://mysql-slave:3306/seckill_db?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC}
        username: ${SPRING_RW_READ_USERNAME:root}
        password: ${SPRING_RW_READ_PASSWORD:root}
    masterslave:
      name: rw_ds
      master-data-source-name: write_ds
      slave-data-source-names: read_ds
      load-balance-algorithm-type: round_robin
    props:
      sql:
        show: true
  redis:
    host: ${SPRING_REDIS_HOST:redis}
    port: ${SPRING_REDIS_PORT:6379}
    password: ${SPRING_REDIS_PASSWORD:}
    database: ${SPRING_REDIS_DATABASE:0}
mybatis:
  mapper-locations: classpath*:mapper/*.xml
  type-aliases-package: com.example.entity
logging:
  level:
    root: INFO
